<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="さくらさくり 桜紋">
  <defs>
    <radialGradient id="petal" cx="50%" cy="78%" r="75%">
      <stop offset="0%"  stop-color="#FDEFF3"/>
      <stop offset="55%" stop-color="#F4AEC0"/>
      <stop offset="100%" stop-color="#E5879F"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="#F4DDA0"/>
      <stop offset="60%" stop-color="#D9B458"/>
      <stop offset="100%" stop-color="#9A7B2E"/>
    </radialGradient>
  </defs>
  <g transform="translate(50 50)">
    <!-- 5枚の花びら（72度ずつ回転・先端に切れ込み） -->
    <g fill="url(#petal)" stroke="#C95E7C" stroke-width="0.8" stroke-opacity="0.45">
      <path d="M0 0 C14 -6 19 -30 4.5 -43 Q0 -47 -4.5 -43 C-19 -30 -14 -6 0 0 Z"/>
      <path d="M0 0 C14 -6 19 -30 4.5 -43 Q0 -47 -4.5 -43 C-19 -30 -14 -6 0 0 Z" transform="rotate(72)"/>
      <path d="M0 0 C14 -6 19 -30 4.5 -43 Q0 -47 -4.5 -43 C-19 -30 -14 -6 0 0 Z" transform="rotate(144)"/>
      <path d="M0 0 C14 -6 19 -30 4.5 -43 Q0 -47 -4.5 -43 C-19 -30 -14 -6 0 0 Z" transform="rotate(216)"/>
      <path d="M0 0 C14 -6 19 -30 4.5 -43 Q0 -47 -4.5 -43 C-19 -30 -14 -6 0 0 Z" transform="rotate(288)"/>
    </g>
    <!-- 中心の蕊（しべ）と金の芯 -->
    <g fill="#D9B458" opacity="0.9">
      <circle cx="0" cy="-12" r="1.7"/>
      <circle cx="11.4" cy="-3.7" r="1.7" transform="rotate(72)"/>
      <circle cx="0" cy="-12" r="1.7" transform="rotate(72)"/>
      <circle cx="0" cy="-12" r="1.7" transform="rotate(144)"/>
      <circle cx="0" cy="-12" r="1.7" transform="rotate(216)"/>
      <circle cx="0" cy="-12" r="1.7" transform="rotate(288)"/>
    </g>
    <circle r="7" fill="url(#core)" stroke="#9A7B2E" stroke-width="0.6"/>
  </g>
</svg>
